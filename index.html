<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관세 조회 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              border: 'hsl(215 20% 65% / 0.2)',
              input: 'hsl(224 32% 18%)',
              ring: 'hsl(213 93% 66%)',
              background: 'hsl(224 71% 4%)',
              foreground: 'hsl(213 31% 91%)',
              muted: 'hsl(217 33% 22%)',
              'muted-foreground': 'hsl(215 20% 72%)',
              primary: 'hsl(213 93% 66%)',
              card: 'hsl(222 47% 11%)'
            },
            boxShadow: {
              soft: '0 12px 45px rgba(2, 6, 23, .45)'
            },
            borderRadius: {
              xl: '0.9rem',
              '2xl': '1rem'
            }
          }
        }
      }
    </script>
  </head>
  <body class="min-h-screen bg-background text-foreground">
    <main class="mx-auto w-full max-w-3xl space-y-4 px-4 py-6">
      <header class="rounded-2xl border border-border bg-gradient-to-br from-slate-900 to-slate-950 p-5 shadow-soft">
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <p class="mb-2 inline-flex rounded-full border border-border bg-slate-800/70 px-2.5 py-1 text-xs font-medium text-slate-300">UNI-PASS Connected</p>
            <h1 class="text-2xl font-bold tracking-tight md:text-3xl">관세 조회 대시보드</h1>
            <p class="mt-2 text-sm text-muted-foreground">shadcn 스타일 UI로 전면 개편하고 UNI-PASS API 기반 조회 흐름을 추가했습니다.</p>
          </div>
          <div class="rounded-xl border border-border bg-slate-900/70 px-3 py-2 text-right text-xs">
            <p class="text-muted-foreground">업데이트 날짜</p>
            <p id="update-date" class="font-semibold"></p>
          </div>
        </div>
      </header>

      <section class="grid gap-4 md:grid-cols-3">
        <article class="md:col-span-2 rounded-2xl border border-border bg-card p-4 shadow-soft">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="text-lg font-semibold">조회 필터</h2>
            <button id="reset-btn" class="rounded-xl border border-border bg-muted px-3 py-2 text-sm font-medium transition hover:bg-slate-700/60 active:scale-95">초기화</button>
          </div>

          <div class="grid gap-3 md:grid-cols-2">
            <label class="space-y-1 text-sm">
              <span class="text-muted-foreground">수출국</span>
              <select id="export-country" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring">
                <option value="">선택하세요</option>
              </select>
            </label>

            <label class="space-y-1 text-sm">
              <span class="text-muted-foreground">수입국</span>
              <select id="import-country" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring">
                <option value="">선택하세요</option>
              </select>
            </label>

            <label class="space-y-1 text-sm md:col-span-2">
              <span class="text-muted-foreground">품목군</span>
              <select id="category" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring">
                <option value="">선택하세요</option>
              </select>
            </label>

            <label class="space-y-1 text-sm">
              <span class="text-muted-foreground">세부 품목</span>
              <select id="item" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring disabled:opacity-50" disabled>
                <option value="">선택하세요</option>
              </select>
            </label>

            <label class="space-y-1 text-sm">
              <span class="text-muted-foreground">재질</span>
              <select id="material" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring disabled:opacity-50" disabled>
                <option value="">선택하세요</option>
              </select>
            </label>

            <label class="space-y-1 text-sm md:col-span-2">
              <span class="text-muted-foreground">HS Code (6~10자리)</span>
              <input id="hs-code" maxlength="10" placeholder="예: 851712" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring" />
            </label>
          </div>
        </article>

        <article class="space-y-3 rounded-2xl border border-border bg-card p-4 shadow-soft">
          <h2 class="text-lg font-semibold">API 설정</h2>
          <label class="space-y-1 text-sm">
            <span class="text-muted-foreground">UNI-PASS 인증키</span>
            <input id="api-key" type="password" placeholder="인증키 입력" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring" />
          </label>
          <button id="save-key-btn" class="w-full rounded-xl bg-primary px-3 py-2 text-sm font-semibold text-slate-950 transition hover:opacity-90">인증키 저장</button>
          <button id="fetch-btn" class="w-full rounded-xl border border-primary/60 bg-primary/20 px-3 py-2 text-sm font-semibold">UNI-PASS 관세 조회</button>
          <p class="text-xs text-muted-foreground">브라우저 CORS/키 권한에 따라 조회 실패 시 샘플 계산치가 표시됩니다.</p>
        </article>
      </section>

      <section class="rounded-2xl border border-border bg-card p-5 shadow-soft">
        <h2 class="text-lg font-semibold">조회 결과</h2>
        <div id="result" class="mt-3 rounded-xl border border-border bg-slate-900/60 p-4 text-sm">필수 항목을 선택한 후 조회를 실행하세요.</div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
