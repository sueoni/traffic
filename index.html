<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관세 조회 (Mobile)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              border: 'rgba(148, 163, 184, 0.25)',
              card: '#0f172a',
              input: '#1e293b',
              muted: '#94a3b8',
              primary: '#e2e8f0'
            },
            boxShadow: {
              soft: '0 10px 30px rgba(2, 6, 23, 0.45)'
            }
          }
        }
      }
    </script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto w-full max-w-md space-y-4 px-3 py-5">
      <section class="rounded-3xl border border-border bg-gradient-to-br from-slate-900 to-slate-950 p-5 shadow-soft">
        <div class="flex items-center justify-between gap-3">
          <div>
            <h1 class="text-3xl font-bold tracking-tight">📱 관세 조회 (Mobile)</h1>
            <p class="mt-2 text-lg text-slate-300">수출국/수입국/품목 기준 관세율을 빠르게 조회합니다.</p>
          </div>
          <div class="rounded-full border border-border bg-slate-700/40 px-4 py-2 text-sm text-slate-200">
            <p>🕘 업데이트 날짜</p>
            <p id="update-date" class="font-semibold"></p>
          </div>
        </div>
      </section>

      <section class="rounded-3xl border border-border bg-slate-900/80 p-5 shadow-soft">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-4xl font-bold">🔎 필터</h2>
          <button id="reset-btn" class="rounded-2xl border border-rose-400/50 bg-rose-900/40 px-4 py-2 text-lg font-semibold text-rose-100 transition active:scale-95">↩ 초기화</button>
        </div>

        <div class="space-y-3">
          <label class="block">
            <span class="mb-1 block text-xl text-slate-300">수출국</span>
            <select id="export-country" class="w-full rounded-2xl border border-border bg-input px-4 py-3 text-2xl outline-none">
              <option value="">-선택-</option>
            </select>
          </label>

          <label class="block">
            <span class="mb-1 block text-xl text-slate-300">수입국</span>
            <select id="import-country" class="w-full rounded-2xl border border-border bg-input px-4 py-3 text-2xl outline-none">
              <option value="">-선택-</option>
            </select>
          </label>

          <label class="block">
            <span class="mb-1 block text-xl text-slate-300">품목</span>
            <select id="category" class="w-full rounded-2xl border border-border bg-input px-4 py-3 text-2xl outline-none">
              <option value="">-선택-</option>
            </select>
          </label>

          <label class="block">
            <span class="mb-1 block text-xl text-slate-300">세부 품목 (선택)</span>
            <select id="item" class="w-full rounded-2xl border border-border bg-input px-4 py-3 text-2xl outline-none disabled:opacity-50" disabled>
              <option value="">-선택-</option>
            </select>
          </label>

          <label class="block">
            <span class="mb-1 block text-xl text-slate-300">재질 (선택)</span>
            <select id="material" class="w-full rounded-2xl border border-border bg-input px-4 py-3 text-2xl outline-none disabled:opacity-50" disabled>
              <option value="">-선택-</option>
            </select>
          </label>

          <p class="text-lg text-slate-300">⚠ 제품의 정확한 HS Code 확인이 필요합니다. 협정/정책 변화로 관세율이 변동될 수 있습니다.</p>
        </div>
      </section>

      <section class="rounded-3xl border border-border bg-slate-900/80 p-5 shadow-soft">
        <h2 class="text-4xl font-bold">✅ 결과</h2>
        <div id="result" class="mt-2 text-2xl text-slate-200">수출국/수입국/품목(필요 시 세부/재질)을 선택하세요.</div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
