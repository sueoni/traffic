<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNI-PASS 관세 조회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              border: 'hsl(215 20% 65% / 0.2)',
              input: 'hsl(224 32% 18%)',
              ring: 'hsl(213 93% 66%)',
              background: 'hsl(224 71% 4%)',
              foreground: 'hsl(213 31% 91%)',
              muted: 'hsl(217 33% 22%)',
              'muted-foreground': 'hsl(215 20% 72%)',
              primary: 'hsl(213 93% 66%)',
              card: 'hsl(222 47% 11%)'
            },
            boxShadow: {
              soft: '0 12px 45px rgba(2, 6, 23, .45)'
            },
            borderRadius: {
              xl: '0.9rem',
              '2xl': '1rem'
            }
          }
        }
      }
    </script>
  </head>
  <body class="min-h-screen bg-background text-foreground selection:bg-primary/40">
    <main class="mx-auto w-full max-w-5xl space-y-4 px-3 py-4 sm:px-4 sm:py-6">
      <header class="rounded-2xl border border-border bg-card p-4 shadow-soft sm:p-5">
        <p class="mb-2 inline-flex rounded-full border border-border bg-slate-800/80 px-2.5 py-1 text-xs font-medium text-slate-300">UNI-PASS 기반</p>
        <h1 class="text-2xl font-bold tracking-tight md:text-3xl">관세 조회</h1>
        <p class="mt-2 text-sm leading-relaxed text-slate-300">자주 조회하는 조건을 프리셋으로 저장하고, 모바일에서도 선명하게 확인할 수 있습니다.</p>
      </header>

      <section class="grid gap-4 lg:grid-cols-3">
        <article class="lg:col-span-2 rounded-2xl border border-border bg-card p-4 shadow-soft">
          <div class="mb-4 flex items-center justify-between">
            <h2 class="text-lg font-semibold">필터</h2>
            <button id="reset-btn" class="rounded-xl border border-border bg-muted px-3 py-2 text-sm font-medium transition hover:bg-slate-700/60">초기화</button>
          </div>

          <div class="mb-4 rounded-xl border border-border bg-slate-900/40 p-3">
            <div class="mb-2 flex items-center justify-between">
              <h3 class="text-sm font-semibold">조회 프리셋</h3>
              <button id="save-preset-btn" class="rounded-lg bg-primary px-3 py-1.5 text-xs font-semibold text-slate-950">현재 조건 저장</button>
            </div>
            <div class="flex items-center gap-2">
              <input id="preset-name" maxlength="24" placeholder="예: KR→US 스마트폰" class="min-w-0 flex-1 rounded-xl border border-border bg-input px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-ring" />
              <button id="delete-preset-btn" class="rounded-xl border border-border bg-muted px-3 py-2 text-xs font-semibold">삭제</button>
            </div>
            <select id="preset-list" class="mt-2 w-full rounded-xl border border-border bg-input px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-ring">
              <option value="">저장된 프리셋 없음</option>
            </select>
          </div>

          <div class="grid gap-3 md:grid-cols-2">
            <label class="space-y-1 text-sm">
              <span class="text-muted-foreground">수출국</span>
              <select id="export-country" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring">
                <option value="">-선택-</option>
              </select>
            </label>

            <label class="space-y-1 text-sm">
              <span class="text-muted-foreground">수입국</span>
              <select id="import-country" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring">
                <option value="">-선택-</option>
              </select>
            </label>

            <label class="space-y-1 text-sm">
              <span class="text-muted-foreground">품목</span>
              <select id="category" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring">
                <option value="">-선택-</option>
              </select>
            </label>

            <label class="space-y-1 text-sm">
              <span class="text-muted-foreground">세부 품목 (선택)</span>
              <select id="item" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring disabled:opacity-50" disabled>
                <option value="">-선택-</option>
              </select>
            </label>

            <label class="space-y-1 text-sm">
              <span class="text-muted-foreground">재질 (선택)</span>
              <select id="material" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring disabled:opacity-50" disabled>
                <option value="">-선택-</option>
              </select>
            </label>

            <label class="space-y-1 text-sm">
              <span class="text-muted-foreground">HS Code</span>
              <input id="hs-code" maxlength="10" placeholder="숫자 6~10자리" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring" />
            </label>
          </div>
        </article>

        <article class="space-y-3 rounded-2xl border border-border bg-card p-4 shadow-soft">
          <h2 class="text-lg font-semibold">조회</h2>
          <label class="space-y-1 text-sm">
            <span class="text-muted-foreground">UNI-PASS 인증키</span>
            <input id="api-key" type="password" placeholder="인증키 입력" class="w-full rounded-xl border border-border bg-input px-3 py-2 outline-none focus:ring-2 focus:ring-ring" />
          </label>
          <button id="save-key-btn" class="w-full rounded-xl border border-border bg-muted px-3 py-2 text-sm font-semibold">키 저장</button>
          <button id="fetch-btn" class="w-full rounded-xl bg-primary px-3 py-2.5 text-sm font-semibold text-slate-950">관세 조회</button>
          <p id="api-source" class="text-xs leading-relaxed text-muted-foreground"></p>
        </article>
      </section>

      <section class="grid gap-4 lg:grid-cols-2">
        <article class="rounded-2xl border border-border bg-card p-4 shadow-soft">
          <div class="mb-2 flex items-center justify-between">
            <h2 class="text-lg font-semibold">관세</h2>
            <span id="data-status" class="rounded-full border border-border bg-muted px-2 py-1 text-xs text-muted-foreground">대기</span>
          </div>
          <div class="mb-3 rounded-xl border border-primary/30 bg-primary/10 p-4">
            <p class="text-xs text-muted-foreground">최종 관세율</p>
            <p id="tariff-rate" class="text-5xl font-black tracking-tight text-primary sm:text-6xl">-</p>
          </div>
          <div id="summary" class="space-y-1.5 text-sm leading-6 text-slate-100"></div>
          <div id="result" class="mt-3 rounded-xl border border-border bg-slate-900/40 p-3 text-sm leading-relaxed"></div>
        </article>

        <article class="rounded-2xl border border-border bg-card p-4 shadow-soft">
          <div class="mb-2 flex items-center justify-between">
            <h2 class="text-lg font-semibold">월별 트렌드</h2>
            <span id="chart-time" class="text-xs text-muted-foreground"></span>
          </div>
          <svg id="trend-chart" viewBox="0 0 320 180" class="w-full rounded-xl border border-border bg-slate-950/60 p-2"></svg>
          <div id="trend-legend" class="mt-2 text-xs text-muted-foreground"></div>
        </article>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
